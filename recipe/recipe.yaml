context:
  version: "3.25.00"

package:
  name: cetmodules
  version: ${{ version }}

source:
  url: https://github.com/FNALssi/cetmodules/archive/refs/tags/${{ version }}.tar.gz
  sha256: 9574d9f8e5757d79c11d6fb3b95c3227aa0028960733715c3e6b6b25a51ff5c5
  patches:
    - auto-include-helpers.patch
    - namespace-install-paths.patch

build:
  noarch: generic
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - sed
  run:
    - bash
    - perl
    # python >=3.9: checkClassVersion is a Python 3 (PyROOT) script. Pin away from
    # the ancient `python 2.0` stub package, which an unconstrained `python` can
    # resolve to and which then fails binary relocation in downstream host envs.
    - python >=3.9
    - __unix

tests:
  - package_contents:
      files:
        - share/cetmodules/cmake/cetmodulesConfig.cmake
        - share/cetmodules/cmake/cetmodulesConfigVersion.cmake
        - share/cetmodules/Modules/CetCMakeEnv.cmake
        - share/cetmodules/Modules/CetCMakeUtils.cmake
        - share/cetmodules/Modules/CetCMakeConfig.cmake
        - share/cetmodules/Modules/CetMake.cmake
        - libexec/cetmodules/checkClassVersion
        - libexec/cetmodules/filter-program-options
        - libexec/cetmodules/make_bash_completions

about:
  homepage: https://github.com/FNALssi/cetmodules
  summary: CMake modules for building interdependent scientific software (Fermilab)
  description: |
    cetmodules provides a set of CMake modules and helper scripts for
    building and using interdependent scientific software. It is developed
    by the Fermilab Scientific Computing Division and used as the build
    infrastructure for the art / LArSoft / Phlex ecosystem.

    Features include facilities for ROOT dictionary generation, assisted
    production of libraries and executables using modern CMake idioms,
    full-featured CMake config file generation with target import / export
    and dependency management, and easy installation of FHiCL / GDML / source
    data files.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/FNALssi/cetmodules

extra:
  recipe-maintainers:
    - calcuttj
    - olantwin
